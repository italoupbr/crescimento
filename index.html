<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagnóstico Empresarial IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              comfortaa: ['Comfortaa', 'cursive', 'sans-serif'],
              display: ['Manrope', 'sans-serif'], // Nova fonte para a página de sucesso
              sans: ['Comfortaa', 'cursive', 'sans-serif'],
            },
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))", // Mantendo coerência com HSL
                foreground: "hsl(var(--primary-foreground))",
                glow: "hsl(var(--primary-glow))",
              },
              // Adicionando cores específicas do novo design, mapeando para as existentes ou novas
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
            },
            boxShadow: {
              'soft': '0 20px 40px -10px rgba(0, 0, 0, 0.05)',
              'glow': '0 0 20px hsl(var(--primary) / 0.5)'
            }
          },
        },
      }
    </script>
    <style>
      :root {
        /* Paleta de Cores HSL */
        --background: 217 31% 90%;
        --foreground: 220 20% 12%;
        
        --primary: 217 91% 51%; /* Blue #135bec matches hsl roughly */
        --primary-foreground: 0 0% 100%;
        --primary-glow: 217 91% 60%;
        
        --secondary: 24 94% 53%; /* Orange accent adjusted */
        --secondary-foreground: 0 0% 100%;
        
        --muted: 217 31% 90%;
        --muted-foreground: 220 15% 40%;
        
        --card: 0 0% 100%;
        --card-foreground: 220 20% 12%;
        
        --popover: 0 0% 100%;
        --popover-foreground: 220 20% 12%;
        
        --border: 220 20% 85%;
        --input: 217 25% 96%;
        --ring: 217 91% 51%;
        
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 0 0% 100%;

        /* Glass Variables */
        --gradient-primary: linear-gradient(135deg, hsl(217 91% 60%) 0%, hsl(217 91% 51%) 50%, hsl(217 91% 45%) 100%);
        
        --shadow-liquid-glow: 0 4px 16px hsl(217 91% 51% / 0.25), 0 2px 8px hsl(217 91% 51% / 0.15);
        
        --liquid-shimmer: linear-gradient(90deg, 
            transparent 0%, 
            rgba(255, 255, 255, 0.1) 30%, 
            rgba(255, 255, 255, 0.7) 50%, 
            rgba(255, 255, 255, 0.1) 70%, 
            transparent 100%
        );
        
        --transition-liquid: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      body {
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        font-family: 'Comfortaa', cursive, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Classes utilitárias para Material Symbols */
      .material-symbols-outlined {
        font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
      }

      /* --- REMOVE AUTOFILL BACKGROUND COLOR --- */
      input:-webkit-autofill,
      input:-webkit-autofill:hover, 
      input:-webkit-autofill:focus, 
      input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px hsl(var(--input)) inset !important;
        -webkit-text-fill-color: hsl(var(--foreground)) !important;
        transition: background-color 5000s ease-in-out 0s;
      }

      /* --- Glass Button Effect --- */
      .glass-button {
        position: relative;
        background: var(--gradient-primary);
        box-shadow: 
            var(--shadow-liquid-glow),
            inset 0 1px 0 rgba(255, 255, 255, 0.3), /* Top highlight */
            inset 0 -1px 0 rgba(0, 0, 0, 0.1);      /* Bottom shade */
        transition: var(--transition-liquid);
        overflow: hidden;
        color: white;
        font-weight: 600; /* SemiBold conforme especificado */
        text-shadow: 0 1px 2px rgba(0,0,0,0.1);
      }

      .glass-button::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: var(--liquid-shimmer);
        transform: rotate(45deg);
        animation: shimmer 3s infinite;
        pointer-events: none;
        filter: blur(12px); 
      }

      @keyframes shimmer {
        0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
        100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
      }

      .glass-button:hover:not(:disabled) {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 
          0 6px 20px hsl(217 91% 51% / 0.35), 
          0 3px 12px hsl(217 91% 51% / 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.4);
        filter: brightness(1.1);
      }

      .glass-button:active:not(:disabled) {
        transform: translateY(0) scale(0.98);
      }

      .glass-button:disabled {
        cursor: not-allowed;
        opacity: 0.85; 
        filter: grayscale(0.1);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0"
  }
}
</script>
